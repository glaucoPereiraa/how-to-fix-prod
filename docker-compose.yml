services:
  composer:
    image: composer:latest
    volumes:
      - ./:/app
    working_dir: /app
  exercise:
    build:
      context: ./exercise1
      dockerfile: Dockerfile
    container_name: exercise
    ports:
      - ${APP_PORT:-80}:80
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=exercise-db
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=exercise-redis
    depends_on:
      - exercise-db
    networks:
      - exercise-network
    volumes:
      - ./:/var/www

  exercise-db:
    image: mysql:8-debian
    platform: linux/amd64
    command: mysqld --default-authentication-plugin=mysql_native_password
    container_name: exercise-db
    ports:
      - "${DB_EXTERNAL_PORT:-3306}:3306"
    environment:
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=mysqlroot
    volumes:
      - exercise-db-mysql:/var/lib/mysql
    networks:
      - exercise-network

  exercise-redis:
    image: redis:7.2.5-alpine
    container_name: exercise-redis
    volumes:
      - exercise-db-redis:/data
    networks:
      - exercise-network

networks:
  exercise-network:
    driver: bridge

volumes:
  exercise-db-mysql:
    driver: local
  exercise-db-redis:
    driver: local
