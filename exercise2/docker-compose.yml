services:
  exercise:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: exercise
    ports:
      - ${APP_PORT:-88}:80
    volumes:
      - ./:/var/www
    networks:
      - exercise-net

  exercise-prod:
    image: glaucostarling/how-to-fix-prod:exercise2
    container_name: exercise-prod
    platform: linux/amd64
    ports:
      - ${APP_PORT_PROD:-80}:80
    networks:
      - exercise-net

  mysql:
    container_name: mysql
    image: mysql:8.0
    restart: unless-stopped
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
      - ./docker/mysql/create_dbs.sql:/docker-entrypoint-initdb.d/create_dbs.sql
    ports:
      - "3388:3306"
    networks:
      - exercise-net
    deploy: # the lines below are to simulate a slow database in production, if you want comment them for first run to not be so slow
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    command: --max_execution_time=5000

networks:
  exercise-net:
    driver: bridge

volumes:
  dbdata:
    driver: local